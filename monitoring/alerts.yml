groups:
  - name: service_alerts
    rules:
      - alert: HighErrorRate
        expr: |
          (sum(rate(http_request_errors_total[5m])) by (job)
          / sum(rate(http_requests_total[5m])) by (job)) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate on {{ $labels.job }}"

      - alert: HighLatencyP95
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket[5m])) by (le, job)
          ) > 1.0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High p95 latency on {{ $labels.job }}"

      - alert: ServiceDown
        expr: up{job=~"api-service|consumer-service"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is DOWN"

      - alert: KafkaConsumerLagHigh
        expr: sum(kafka_consumergroup_lag) by (consumergroup) > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Kafka consumer lag is high: {{ $value }}"

      - alert: PostgresConnectionsHigh
        expr: pg_stat_activity_count > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL connections high: {{ $value }}"

  - name: sli_slo_alerts
    rules:
      - alert: SLO_AvailabilityBreach
        expr: |
          (sum(rate(http_requests_total{status=~"2.."}[5m]))
          / sum(rate(http_requests_total[5m]))) < 0.95
        for: 5m
        labels:
          severity: critical
          slo: availability
        annotations:
          summary: "SLO BREACH: availability below 95%"

      - alert: SLO_LatencyBreach
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket[5m])) by (le)
          ) > 1.0
        for: 5m
        labels:
          severity: critical
          slo: latency
        annotations:
          summary: "SLO BREACH: p95 latency above 1000ms"
